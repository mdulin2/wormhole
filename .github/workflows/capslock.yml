name: Capslock 
on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read # Needs to read the contents of PRs

jobs: 
  capslock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: "1.23.3"
      - name: Compare generated to committed capslock files
        run: |
         cd ./node/hack/capslock;

         # Configure go items that allow the script to run
         export GOPATH=$HOME/go 
         export GOBIN=$GOPATH/bin 
         export PATH=$GOBIN:$PATH

         # Run the script to check the capabilities of the dependencies.
         ./execute_capslock.sh

         git diff --name-only --exit-code && echo "✅ Generated capslock matches committed capslock" || (echo "❌ Generated capslock differs from committed capslock, run \`./node/hack/capslock/execute_capslock.sh\` and commit the result" >&2 && exit 1)
name: Capslock 
on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read # Needs to read the contents of PRs

jobs: 
  capslock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: "1.23.3"
      - run: |
         ls -la; 
         cd /node/hack/capslock;
         ./execute_capslock.sh